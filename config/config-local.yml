server:
  AppVersion: 1.0.0
  Port: :3001
  Mode: Development
  JwtSecretKey: secretkey
swagger:
  Title: Swagger API Docs
  BasePath: /
  FilePath: ./docs/compile/swagger.yaml
  Path: swagger
database:
  driver: postgres
telemetry:
  enabled: false
  serviceName: boilerplate-service
broker:
  enabled: true
  allowAutoTopicCreation: true
  maxAttempts: 3
